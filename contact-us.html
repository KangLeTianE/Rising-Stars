<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rising Star | Contact Us</title>

  <style>
    :root {
      --text: #111827;
      --muted: #6b7280;
      --gold-1: #ffd76a;
      --gold-2: #ffb800;
      --gold-3: #ff8a00;
      --blue-1: #4f7cff;
      --blue-2: #7a5cff;
      --line: rgba(17, 24, 39, 0.14);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      background: #f4f7fb;
    }

    body {
      min-height: 100vh;
      position: relative;
      isolation: isolate;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: transparent;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background:
        radial-gradient(circle at top left, rgba(122, 92, 255, 0.10), transparent 30%),
        radial-gradient(circle at bottom right, rgba(255, 184, 0, 0.14), transparent 30%),
        linear-gradient(180deg, #fcfcfe 0%, #f4f7fb 100%);
    }

    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 48px;
      z-index: 999;
      display: flex;
      justify-content: flex-start;
      align-items: stretch;
      padding: 0;
      background: rgba(255, 255, 255, 0.94);
      border-bottom: 1px solid rgba(17, 24, 39, 0.12);
      box-shadow: 0 4px 16px rgba(17, 24, 39, 0.06);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .nav-links {
      display: flex;
      align-items: stretch;
      height: 100%;
      width: 100%;
      gap: 0;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
    }

    .nav-links a {
      height: 100%;
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 22px;
      text-decoration: none;
      color: var(--text);
      font-size: 0.95rem;
      font-weight: 700;
      border-right: 1px solid rgba(17, 24, 39, 0.12);
      border-radius: 0;
      white-space: nowrap;
      transition: 0.2s ease;
    }

    .nav-links a:first-child {
      border-left: 1px solid rgba(17, 24, 39, 0.12);
    }

    .nav-links a:hover {
      background: rgba(17, 24, 39, 0.06);
    }

    .nav-links a.active {
      color: #ffffff;
      background: linear-gradient(90deg, var(--blue-1), var(--blue-2));
    }

    .contact {
      min-height: 100vh;
      padding: 92px 80px 70px;
    }

    .contact-intro {
      max-width: 760px;
    }

    .contact-intro h1 {
      font-size: clamp(2.3rem, 4.6vw, 4.7rem);
      line-height: 0.95;
      letter-spacing: -0.04em;
      font-weight: 900;
      margin: 0 0 12px;
      background: linear-gradient(90deg, var(--blue-1), var(--blue-2), var(--gold-2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .contact-intro p {
      max-width: 560px;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.65;
      margin: 0;
    }

    .contact-content {
      width: min(100%, 860px);
      margin-top: 42px;
      border-top: 1px solid var(--line);
    }

    .contact-row {
      display: grid;
      grid-template-columns: 115px 1fr;
      column-gap: 18px;
      padding: 28px 0;
      border-bottom: 1px solid var(--line);
    }

    .contact-label {
      color: var(--blue-1);
      font-size: 0.82rem;
      font-weight: 900;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      line-height: 1.4;
    }

    .contact-value {
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.8;
      text-decoration: none;
      overflow-wrap: anywhere;
    }

    a.contact-value {
      transition: color 0.2s ease;
    }

    a.contact-value:hover {
      color: var(--blue-1);
    }

    @media (max-width: 640px) {
      .nav-links a {
        font-size: 0.82rem;
        padding: 0 9px;
      }

      .contact {
        padding: 88px 24px 60px;
      }

      .contact-row {
        grid-template-columns: 1fr;
        row-gap: 10px;
        padding: 26px 0;
      }

      .contact-value {
        font-size: 0.98rem;
      }
    }
  </style>
</head>

<body>
  <nav class="navbar">
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="club-members.html">Club Members</a>
      <a href="club-history.html">Club History</a>
      <a href="contact-us.html" class="active">Contact Us</a>
    </div>
  </nav>

  <main class="contact">
    <section class="contact-intro" aria-label="Contact introduction">
      <h1>Contact Us</h1>
      <p>
        Get in touch with Rising Star for club questions, event information, or future participation.
      </p>
    </section>

    <section class="contact-content" aria-label="Contact Rising Star">
      <div class="contact-row">
        <div class="contact-label">Email</div>
        <a class="contact-value" href="mailto:233630787@qq.com">233630787@qq.com</a>
      </div>

      <div class="contact-row">
        <div class="contact-label">Wechat</div>
        <p class="contact-value">jonnykangkang</p>
      </div>
    </section>
  </main>
</body>
</html>
