<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rising Star | Club Members</title>

  <style>
    :root {
      --text: #111827;
      --muted: #6b7280;
      --gold-1: #ffd76a;
      --gold-2: #ffb800;
      --gold-3: #ff8a00;
      --blue-1: #4f7cff;
      --blue-2: #7a5cff;
      --line: rgba(17, 24, 39, 0.14);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: auto;
      background: #f4f7fb;
    }

    body {
      min-height: 100vh;
      position: relative;
      isolation: isolate;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      padding-bottom: 96px;
      background: transparent;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background:
        radial-gradient(circle at top left, rgba(122, 92, 255, 0.10), transparent 30%),
        radial-gradient(circle at bottom right, rgba(255, 184, 0, 0.14), transparent 30%),
        linear-gradient(180deg, #fcfcfe 0%, #f4f7fb 100%);
    }

    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 48px;
      z-index: 999;
      display: flex;
      justify-content: flex-start;
      align-items: stretch;
      padding: 0;
      background: rgba(255, 255, 255, 0.94);
      border-bottom: 1px solid rgba(17, 24, 39, 0.12);
      box-shadow: 0 4px 16px rgba(17, 24, 39, 0.06);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .nav-links {
      display: flex;
      align-items: stretch;
      height: 100%;
      width: 100%;
      gap: 0;
      overflow-x: auto;
      overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
    }

    .nav-links a {
      height: 100%;
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 22px;
      text-decoration: none;
      color: var(--text);
      font-size: 0.95rem;
      font-weight: 700;
      border-right: 1px solid rgba(17, 24, 39, 0.12);
      border-radius: 0;
      white-space: nowrap;
      transition: 0.2s ease;
    }

    .nav-links a:first-child {
      border-left: 1px solid rgba(17, 24, 39, 0.12);
    }

    .nav-links a:hover {
      background: rgba(17, 24, 39, 0.06);
    }

    .nav-links a.active {
      color: #ffffff;
      background: linear-gradient(90deg, var(--blue-1), var(--blue-2));
    }

    .stars-shortcut {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      z-index: 998;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 9px 0 calc(9px + env(safe-area-inset-bottom));
      background: #ffffff;
      border-top: 1px solid rgba(17, 24, 39, 0.10);
      box-shadow: 0 -8px 24px rgba(17, 24, 39, 0.08);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .stars-shortcut-inner {
      display: flex;
      justify-content: center;
      align-items: center;
      line-height: 1;
    }

    .stars-grid {
      display: grid;
      grid-template-columns: repeat(var(--stars-cols, 10), 1ch);
      grid-template-rows: auto auto;
      justify-content: center;
      justify-items: center;
      align-items: start;
      font-size: 30px;
      line-height: 1;
      background: linear-gradient(90deg, var(--blue-1), var(--blue-2), var(--gold-2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .stars-static-letter {
      grid-row: 1;
      grid-column: var(--col);
      font-weight: 950;
      color: transparent;
    }

    .stars-page-link {
      grid-row: 1 / span 2;
      grid-column: var(--col);
      width: 100%;
      display: grid;
      grid-template-rows: auto auto;
      justify-items: center;
      align-items: start;
      text-decoration: none;
      color: transparent;
    }

    .stars-page-letter {
      grid-row: 1;
      font-weight: 950;
      color: transparent;
    }

    .stars-number {
      grid-row: 2;
      height: 16px;
      margin-top: 5px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      color: var(--text);
      font-size: 11px;
      font-weight: 950;
      line-height: 1;
      opacity: 0.72;
      border-bottom: 2px solid transparent;
      transition: color 0.2s ease, opacity 0.2s ease, border-color 0.2s ease;
    }

    .stars-page-link:hover .stars-number,
    .stars-page-link:focus-visible .stars-number {
      color: var(--blue-1);
      opacity: 1;
      border-bottom-color: var(--blue-1);
    }

    .page-intro {
      padding: 92px 80px 18px;
    }

    .intro-text {
      max-width: 680px;
    }

    .page-intro h1 {
      font-size: clamp(2.3rem, 4.6vw, 4.7rem);
      line-height: 0.95;
      letter-spacing: -0.04em;
      font-weight: 900;
      margin: 0 0 12px;
      background: linear-gradient(90deg, var(--blue-1), var(--blue-2), var(--gold-2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .page-intro p {
      max-width: 540px;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.65;
      margin: 0;
    }

    .member-search {
      width: min(100%, 520px);
      margin-top: 22px;
    }

    .member-search label {
      display: block;
      margin-bottom: 8px;
      color: var(--blue-1);
      font-size: 0.72rem;
      font-weight: 900;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .member-search input {
      width: 100%;
      appearance: none;
      -webkit-appearance: none;
      border: 1px solid rgba(17, 24, 39, 0.14);
      outline: none;
      border-radius: 999px;
      padding: 14px 18px;
      color: var(--text);
      font: inherit;
      font-size: 1rem;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 14px 34px rgba(17, 24, 39, 0.07);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .member-search input:focus {
      background: rgba(255, 255, 255, 0.78);
      border-color: rgba(79, 124, 255, 0.55);
      box-shadow:
        0 14px 34px rgba(17, 24, 39, 0.07),
        0 0 0 4px rgba(79, 124, 255, 0.12);
    }

    .member-search input::placeholder {
      color: rgba(107, 114, 128, 0.72);
    }

    .members {
      width: 100%;
    }

    .member-group-anchor {
      height: 0;
      scroll-margin-top: 68px;
    }

    .member-section {
      display: grid;
      grid-template-columns: minmax(250px, 31vw) minmax(300px, 1fr);
      align-items: start;
      column-gap: clamp(24px, 3.5vw, 48px);
      padding: 38px 80px;
      border-top: 1px solid var(--line);
    }

    .member-section:last-child {
      border-bottom: 1px solid var(--line);
    }

    .member-photo {
      width: 100%;
      height: min(60vh, 520px);
      min-height: 380px;
      border-radius: 30px;
      overflow: hidden;
      position: relative;
      box-shadow:
        0 24px 64px rgba(17, 24, 39, 0.14),
        0 10px 24px rgba(79, 124, 255, 0.12);
      background: rgba(255, 255, 255, 0.5);
    }

    .member-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: saturate(1.04) contrast(1.02);
    }

    .member-content {
      width: 100%;
      max-width: min(100%, var(--member-text-width, 390px));
      padding-top: 6px;
    }

    .info-block {
      border-top: 1px solid var(--line);
    }

    .info-row {
      padding: 18px 0;
      border-bottom: 1px solid var(--line);
    }

    .field-label {
      display: block;
      margin-bottom: 7px;
      font-size: 0.72rem;
      font-weight: 900;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--blue-1);
    }

    .member-name {
      font-size: clamp(1.8rem, 3.3vw, 3.7rem);
      line-height: 0.95;
      letter-spacing: -0.06em;
      font-weight: 900;
      color: var(--text);
    }

    .member-about {
      color: var(--muted);
      font-size: 0.94rem;
      line-height: 1.75;
      max-width: 100%;
    }

    .no-results {
      padding: 38px 80px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.6;
    }

    @media (max-width: 900px) {
      .page-intro {
        padding: 92px 28px 20px;
      }

      .member-section {
        grid-template-columns: minmax(220px, 340px) minmax(260px, 1fr);
        column-gap: 28px;
        padding: 34px 28px;
      }

      .member-photo {
        height: 480px;
        min-height: 340px;
      }

      .no-results {
        padding: 34px 28px;
      }
    }

    @media (max-width: 680px) {
      body {
        padding-bottom: 90px;
      }

      .nav-links a {
        font-size: 0.82rem;
        padding: 0 9px;
      }

      .stars-grid {
        font-size: 28px;
      }

      .stars-number {
        height: 15px;
        font-size: 10px;
      }

      .page-intro {
        padding: 88px 24px 18px;
      }

      .member-search {
        margin-top: 20px;
      }

      .member-search input {
        padding: 13px 16px;
        font-size: 0.95rem;
      }

      .member-section {
        grid-template-columns: 1fr;
        row-gap: 22px;
        padding: 34px 24px;
      }

      .member-photo {
        height: 420px;
        min-height: 300px;
        border-radius: 24px;
      }

      .member-content {
        max-width: 100%;
        padding-top: 0;
      }

      .member-about {
        max-width: 100%;
      }

      .no-results {
        padding: 34px 24px;
      }
    }
  </style>
</head>

<body>
  <nav class="navbar">
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="club-members.html" class="active">Club Members</a>
      <a href="club-history.html">Club History</a>
      <a href="contact-us.html">Contact Us</a>
    </div>
  </nav>

  <nav class="stars-shortcut" aria-label="Club member group shortcuts">
    <div class="stars-shortcut-inner">
      <div class="stars-grid" id="starsGrid" data-shortcut-groups="6"></div>
    </div>
  </nav>

  <header class="page-intro">
    <div class="intro-text">
      <h1>Club Members</h1>
      <p>
        Meet the club members who host Rising Star’s online discussion meetings.
      </p>
      <div class="member-search">
        <input
          id="memberSearch"
          type="search"
          autocomplete="off"
          placeholder="Search for a club member..."
          aria-label="Search for a club member by name"
        />
      </div>
    </div>
  </header>

  <main class="members" id="membersList"></main>

  <script>
    const clubMembers = [
      {
        name: "Tim Kang",
        image: "tim.jpg",
        about: "Tim Kang is the founder of the Rising Stars club. Since his first meeting in Feb 2024, he has hosted hundreds of meetings, each with around 10 participants, and inspired others to host their own meetings. He is most proud of his meetings in which participants solves problems, such as wildlife survival. His hobbies, excluding hosting meetings, includes programming games and simulations, playing football, and designing tree search algorithms. He is also the creator of this website! He believes that following your passion is important to success; there are few successful people who isn’t passionate about their profession. He hopes you achieve success by following your passion, and that joining the Rising Stars Club can help you discover what that passion is."
      },
      {
        name: "Lillian Shen",
        image: "logo_plus_background.png",
        about: "Lillian Shen, also known as Lilly, is the most active host of the Rising Stars Club. In the first half of 2026, she has held over fifty themed meetings covering English music sharing, open discussions, The Chronicles of Narnia, as well as the Harry Potter book and film series. She has also encouraged all participants to organize meetings independently. She takes great joy in seeing many club members fall in love with classic literary works. In her spare time, Lillian enjoys roller hockey, singing, and observing plants and wild animals. Her greatest idol is Jane Goodall. She deeply believes that dedication, gentle perseverance and hope can inspire countless people to start with small steps and pursue their dreams."
      },
      {
        name: "Mark Jian",
        image: "mark.jpg",
        about: "Mark is an active host of the Rising Star Club. He has held nearly 20 meetings so far. Now he is organizing a series of history-themed meetings and plans to hold 20 such sessions in total. Everyone can explore historical figures and gain new knowledge while having a wonderful time. He enjoys singing and playing tennis. His dream is to become a world-class player, or at the very least win a Grand Slam title. He also plays the piano, hoping to master his favorite pieces and perform in public someday. Besides these, he loves reading. His favorite books are Harry Potter, Skandar and Percy Jackson. He is greatly interested in Greek mythology and knows a great deal about Greek gods and heroes. He is also a big fan of soccer and table tennis. He enjoys watching their matches, discussing the players' tactics and sharing ideas on how to make improvements. He sincerely hopes all his dreams will come true one day."
      }
    ];

    const membersList = document.getElementById("membersList");
    const starsGrid = document.getElementById("starsGrid");
    const memberSearch = document.getElementById("memberSearch");

    function getNameMatchScore(name, searchText) {
      const normalizedName = name.toLowerCase();
      const normalizedSearchText = searchText.trim().toLowerCase();

      if (normalizedSearchText === "") {
        return 0;
      }

      if (normalizedName === normalizedSearchText) {
        return 1000;
      }

      if (normalizedName.startsWith(normalizedSearchText)) {
        return 800 - normalizedName.length;
      }

      const matchIndex = normalizedName.indexOf(normalizedSearchText);

      if (matchIndex !== -1) {
        return 600 - matchIndex - normalizedName.length;
      }

      let sequentialMatches = 0;
      let searchIndex = 0;

      for (const letter of normalizedName) {
        if (letter === normalizedSearchText[searchIndex]) {
          sequentialMatches++;
          searchIndex++;
        }

        if (searchIndex === normalizedSearchText.length) {
          break;
        }
      }

      if (sequentialMatches === normalizedSearchText.length) {
        return 300 - normalizedName.length;
      }

      return -1;
    }

    function getMatchingMembers(searchText) {
      const normalizedSearchText = searchText.trim().toLowerCase();

      if (normalizedSearchText === "") {
        return clubMembers;
      }

      return clubMembers
        .map((member, originalIndex) => ({
          ...member,
          originalIndex,
          matchScore: getNameMatchScore(member.name, normalizedSearchText)
        }))
        .filter(member => member.matchScore >= 0)
        .sort((a, b) => {
          if (b.matchScore !== a.matchScore) {
            return b.matchScore - a.matchScore;
          }

          return a.originalIndex - b.originalIndex;
        });
    }

    function getPlainTextLength(htmlText) {
      const temporaryElement = document.createElement("div");
      temporaryElement.innerHTML = htmlText;
      return temporaryElement.textContent.trim().length;
    }

    function getMemberTextWidth(aboutText) {
      const textLength = getPlainTextLength(aboutText);
      const extraWidth = Math.max(0, textLength - 170) * 0.85;

      return Math.round(Math.min(820, 390 + extraWidth));
    }

    function renderMembers(members) {
      if (members.length === 0) {
        membersList.innerHTML = `
          <p class="no-results">
            No club members match that name.
          </p>
        `;
        return;
      }

      membersList.innerHTML = members.map(member => `
        <section class="member-section" style="--member-text-width: ${getMemberTextWidth(member.about)}px;">
          <div class="member-photo">
            <img src="${member.image}" alt="${member.name}" />
          </div>

          <div class="member-content">
            <div class="info-block">
              <div class="info-row">
                <span class="field-label">Name</span>
                <h2 class="member-name">${member.name}</h2>
              </div>

              <div class="info-row">
                <span class="field-label">About</span>
                <p class="member-about">${member.about}</p>
              </div>
            </div>
          </div>
        </section>
      `).join("");
    }

    function createStaticLetter(letter, column) {
      const span = document.createElement("span");
      span.className = "stars-static-letter";
      span.style.setProperty("--col", column);
      span.textContent = letter;
      return span;
    }

    function createShortcutLink(groupNumber, column) {
      const link = document.createElement("a");
      link.className = "stars-page-link";
      link.style.setProperty("--col", column);
      link.href = `#member-group-${groupNumber}`;
      link.setAttribute("aria-label", `Jump to club member group ${groupNumber}`);

      const letter = document.createElement("span");
      letter.className = "stars-page-letter";
      letter.textContent = "a";

      const number = document.createElement("span");
      number.className = "stars-number";
      number.textContent = groupNumber;

      link.append(letter, number);
      return link;
    }

    function createGroupAnchor(groupNumber) {
      const anchor = document.createElement("div");
      anchor.className = "member-group-anchor";
      anchor.id = `member-group-${groupNumber}`;
      return anchor;
    }

    function buildStarsShortcut() {
      const memberSections = Array.from(document.querySelectorAll(".member-section"));
      const totalMembers = memberSections.length;
      const requestedGroups = Number(starsGrid.dataset.shortcutGroups) || 6;
      const totalGroups = Math.min(requestedGroups, totalMembers);

      starsGrid.innerHTML = "";

      if (totalMembers === 0) {
        starsGrid.style.setProperty("--stars-cols", 5);
        starsGrid.append(
          createStaticLetter("S", 1),
          createStaticLetter("t", 2),
          createStaticLetter("a", 3),
          createStaticLetter("r", 4),
          createStaticLetter("s", 5)
        );
        return;
      }

      starsGrid.style.setProperty("--stars-cols", totalGroups + 4);

      starsGrid.append(
        createStaticLetter("S", 1),
        createStaticLetter("t", 2)
      );

      for (let groupIndex = 0; groupIndex < totalGroups; groupIndex++) {
        const groupNumber = groupIndex + 1;
        const memberStartIndex = Math.floor((groupIndex * totalMembers) / totalGroups);
        const targetMember = memberSections[memberStartIndex];

        targetMember.before(createGroupAnchor(groupNumber));
        starsGrid.append(createShortcutLink(groupNumber, groupIndex + 3));
      }

      starsGrid.append(
        createStaticLetter("r", totalGroups + 3),
        createStaticLetter("s", totalGroups + 4)
      );
    }

    function updateVisibleMembers() {
      const matchingMembers = getMatchingMembers(memberSearch.value);
      renderMembers(matchingMembers);
      buildStarsShortcut();
    }

    memberSearch.addEventListener("input", updateVisibleMembers);

    updateVisibleMembers();
  </script>
</body>
</html>
